name: Bug Report
description: Report a bug or crash
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  
  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      description: What version of U-Heroes are you using?
      placeholder: "0.1.0"
    validations:
      required: true
  
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft Version
      placeholder: "1.20.1"
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Do this
        2. Then do that
        3. Bug happens
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: Crash Log
      render: shell
